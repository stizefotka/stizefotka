<!DOCTYPE html> 
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stize.fotka</title>

<link rel="icon" type="image/png" href="logo.jpeg">

<style>
*{box-sizing:border-box;}

body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:radial-gradient(circle at top,#120016,#000000);
    color:white;
}

header{text-align:center;padding:20px;}
header img{
    width:160px;
    filter:drop-shadow(0 0 20px #ff0055);
}
h1{
    font-size:30px;
    text-shadow:0 0 15px #ff0055;
}

.social-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}
.social-bar img{
    width:36px;
    filter:drop-shadow(0 0 10px #ff0055);
}

.gallery{
    max-width:1100px;
    margin:60px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
    gap:30px;
    padding:0 20px;
}

.gallery-cover{
    position:relative;
    height:400px;
    cursor:pointer;
}

.gallery-cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:20px;
    border:2px solid #ff0055;
}

.cover-title{
    position:absolute;
    bottom:0;
    width:100%;
    padding:15px;
    text-align:center;
    background:rgba(0,0,0,0.7);
    color:#ff0055;
    font-weight:bold;
    border-radius:0 0 20px 20px;
}

/* LIGHTBOX */
#lightbox{
    position:fixed;
    display:none;
    inset:0;
    background:rgba(0,0,0,0.95);
    justify-content:center;
    align-items:center;
    z-index:999;
}

#lightbox img{
    max-width:90%;
    max-height:85%;
    border-radius:15px;
}

.lightbox-arrow{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:35px;
    background:rgba(0,0,0,0.6);
    color:#ff0055;
    border:none;
    padding:8px 14px;
    cursor:pointer;
}

#prev{left:40px;}
#next{right:40px;}

footer{
    text-align:center;
    padding:20px;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <img src="logo.jpeg">
    <h1>@stize.fotka</h1>
</header>

<div class="social-bar">
    <a href="https://www.facebook.com"><img src="Facebook.png"></a>
    <a href="https://www.instagram.com/stize.fotka"><img src="Instagram_icon.png"></a>
    <a href="https://www.tiktok.com/@stize.fotka"><img src="tiktok.png"></a>
</div>

<div class="gallery">

    <!-- MLADJA -->
    <div class="gallery-cover" onclick="openSet(0)">
        <img id="cover0" src="mladja1.jpeg">
        <div class="cover-title">Mladja Photoshoot</div>
    </div>

    <!-- AP -->
    <div class="gallery-cover" onclick="openSet(1)">
        <img id="cover1" src="ap1.jpeg">
        <div class="cover-title">AP Photoshoot</div>
    </div>

    <!-- MILOS1 -->
    <div class="gallery-cover" onclick="openSet(2)">
        <img id="cover2" src="milos1/b1.jpg">
        <div class="cover-title">Kickbox Photoshoot</div>
    </div>

    <!-- MILOS2 -->
    <div class="gallery-cover" onclick="openSet(3)">
        <img id="cover3" src="milos2/c1.jpg">
        <div class="cover-title">Kickbox Details</div>
    </div>

</div>

<div id="lightbox">
    <button class="lightbox-arrow" id="prev" onclick="prevImg()">❮</button>
    <img id="lightbox-img">
    <button class="lightbox-arrow" id="next" onclick="nextImg()">❯</button>
</div>

<footer>© 2026 stize.fotka</footer>

<script>

const sets = [

/* MLADJA */
[
"mladja1.jpeg",
"mladja2.jpeg",
"mladja3.jpeg",
"mladja4.jpeg",
"mladja5.jpeg",
"mladja6.jpeg",
"mladja7.jpeg",
"mladja8.jpeg",
"mladja9.jpeg",
"mladja10.jpeg"
],

/* AP */
[
"ap1.jpeg",
"ap2.jpeg",
"ap3.jpeg"
],

/* MILOS1 */
[
"b1.png",
"b2.jepg",
"b3.jepg",
"b4.png",
"b5.jpeg",
"b6.png",
"b77.jpeg",
"b8.png",
"b9.jpeg",
"b10.png",
"b11.png",
"b12.png"
],

/* MILOS2 */
[
"c1.jpeg",
"c2.jpeg",
"c3.jpeg",
"c4.jpeg",
"c5.jpeg",
"c6.jpeg",
"c7.jpeg",
"c8.jpeg",
"c9.jpeg",
"c10.jpeg"

]

];

let currentSet = 0;
let currentIndex = 0;

/* AUTO COVER */
sets.forEach((set,index)=>{
    let coverIndex=0;
    const cover=document.getElementById("cover"+index);

    if(!cover) return;

    setInterval(()=>{
        coverIndex=(coverIndex+1)%set.length;
        cover.src=set[coverIndex];
    },2000);
});

function openSet(index){
    currentSet=index;
    currentIndex=0;
    document.getElementById("lightbox").style.display="flex";
    document.getElementById("lightbox-img").src=sets[index][0];
}

function nextImg(){
    currentIndex=(currentIndex+1)%sets[currentSet].length;
    document.getElementById("lightbox-img").src=sets[currentSet][currentIndex];
}

function prevImg(){
    currentIndex=(currentIndex-1+sets[currentSet].length)%sets[currentSet].length;
    document.getElementById("lightbox-img").src=sets[currentSet][currentIndex];
}

document.addEventListener("keydown",function(e){
    if(document.getElementById("lightbox").style.display==="flex"){
        if(e.key==="ArrowRight") nextImg();
        if(e.key==="ArrowLeft") prevImg();
    }
});

</script>

</body>
</html>
